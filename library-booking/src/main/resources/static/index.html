<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Booking System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <h1>📚 Library Booking System</h1>

    <!-- CREATE BOOKING FORM -->
    <div class="card">
        <h2>New Booking</h2>
        <div id="message" class="message"></div>

        <div class="form-group">
            <label>Book Title</label>
            <input type="text" id="bookTitle" placeholder="e.g. The Hobbit">
        </div>
        <div class="form-group">
            <label>Borrower Name</label>
            <input type="text" id="borrowerName" placeholder="e.g. Mario Rossi">
        </div>
        <div class="form-group">
            <label>Start Date</label>
            <input type="date" id="startDate">
        </div>
        <div class="form-group">
            <label>End Date</label>
            <input type="date" id="endDate">
        </div>
        <button class="btn-primary" onclick="createBooking()">Create Booking</button>
    </div>

    <!-- BOOKINGS TABLE -->
    <div class="card">
        <h2>All Bookings</h2>
        <button class="btn-refresh" onclick="loadBookings()">↻ Refresh</button>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Book Title</th>
                <th>Borrower</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody id="bookingsTable">
            <tr><td colspan="7">Loading...</td></tr>
            </tbody>
        </table>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
